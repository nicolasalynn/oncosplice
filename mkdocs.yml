site_name: oncosplice
site_description: Sequence-level pipeline for splicing-epistasis analysis of single, double, and N-variant constructs.
site_url: https://nicolasalynn.github.io/oncosplice
repo_url: https://github.com/nicolasalynn/oncosplice
repo_name: nicolasalynn/oncosplice
copyright: Copyright &copy; 2024-2026 Nicolas Lynn
docs_dir: docs

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            members_order: source
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Classifier: classifier.md
  - Engines: engines.md
  - Bulk analysis: bulk.md
  - API reference:
      - Engine: api/engine.md
      - Results: api/results.md
      - Scoring: api/scoring.md
      - Engines: api/engines.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nicolasalynn/oncosplice
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/oncosplice/
