name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "oncosplice/**"     # API reference is generated from docstrings
      - "CHANGELOG.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs deps
        run: |
          python -m pip install --upgrade pip
          # Install the package itself so mkdocstrings can introspect it.
          pip install -e . --no-deps
          pip install "numpy<2" "pandas>=2.2.2" "matplotlib>=3.9" "biopython>=1.84"
          pip install mkdocs-material mkdocstrings[python] pymdown-extensions

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
