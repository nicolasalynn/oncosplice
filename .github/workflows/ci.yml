name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          # Core deps only — the splice engines aren't needed for the pure-python
          # scoring/variants tests, and skipping them keeps CI fast.
          # numpy<2 pinned to avoid a GH-Actions-specific numpy 2.x toolcache
          # vs pip-install conflict (see: hosted Python tool-cache pre-installs
          # numpy 2 in a way that collides with freshly-pip-installed pandas).
          # The package itself is numpy-2 compatible — this constraint is CI-only.
          pip install "numpy<2" "pandas>=2.2.2" "matplotlib>=3.9" \
                      "biopython>=1.84" pytest pytest-cov ruff

      - name: Install oncosplice (no engine extras, no geney/seqmat)
        run: pip install -e . --no-deps

      - name: Lint with ruff
        # Stylistic codes we tolerate intentionally:
        # - E501  line-too-long (long docstrings / SQL-ish data lines)
        # - E402  module-level import not at top (lazy-import patterns)
        # - F841  unused-variable (some assignments document intent)
        # - E701  multiple statements on one line (compact dict-builder pattern)
        run: ruff check oncosplice/ --select E,F,W,I --ignore E501,E402,F841,E701,E702,E731,E741

      - name: Run pure-python tests
        # Skip tests that need geney/seqmat/torch — those are integration tests
        # the user runs locally; CI focuses on the scoring + variants logic.
        run: |
          pytest tests/test_scoring.py tests/test_variants.py -v \
            --cov=oncosplice.scoring \
            --cov=oncosplice.variants \
            --cov-report=term-missing
